appId: app.puzzle.padaku
---
# Reusable flow: Dismiss initial Help modal by checking "Don't show again" and tapping OK
- extendedWaitUntil:
    visible:
      id: "help-modal-dont-show-again"
    timeout: 25000
- assertVisible:
    id: "help-modal-dont-show-again"
- takeScreenshot: "screenshots/padaku/02_help_modal"
- tapOn:
    id: "help-modal-dont-show-again"
- tapOn: "ಸರಿ"
