appId: app.puzzle.padaku
---
# Setup: Launch app cleanly
- launchApp:
    appId: app.puzzle.padaku
    clearState: true
    stopApp: true

# Allow window transition animation to finish before initial screenshot
- waitForAnimationToEnd:
    timeout: 5000

# Take screenshot immediately after launch to capture initial screen state
- takeScreenshot: "screenshots/padaku/00_after_launch"

# Verify home screen list cards loaded (wait up to 15s for JS render after cold start)
- extendedWaitUntil:
    visible: "ಆಡು"
    timeout: 15000
- assertVisible: "ಆಡು"
- takeScreenshot: "screenshots/padaku/01_home_screen"

# Tap Play button on Padaku card (first item)
- tapOn: "ಆಡು"
