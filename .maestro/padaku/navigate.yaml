appId: app.puzzle.padaku
---
# Setup: Launch app and ensure notifications allowed
- launchApp:
    permissions:
      notifications: allow

# Verify home screen list cards loaded (wait up to 15s for JS render after cold start)
- extendedWaitUntil:
    visible: "ಆಡು"
    timeout: 15000
- assertVisible: "ಆಡು"
- takeScreenshot: "screenshots/padaku/01_home_screen"

# Tap Play button on Padaku card (first item)
- tapOn: "ಆಡು"
