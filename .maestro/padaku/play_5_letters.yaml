appId: app.puzzle.padaku
---
# 1. Take screenshot of Info Alert showing 5-letter word count
- takeScreenshot: "screenshots/padaku/03_info_alert_5_letters"

# 2. Dismiss Info Alert by tapping Continue
- tapOn: "ಮುಂದುವರಿಸು"

# 3. Execute walkthrough tutorial
- runFlow: walkthrough.yaml

# 4. Type a 5-letter guess (example: ತಿರುಗಾಟ -> ತ, ಇ, ರ, ಉ, ಗ, ಆ, ಟ)
- tapOn:
    id: "key-ತ"
- tapOn:
    id: "key-ಇ"
- tapOn:
    id: "key-ರ"
- tapOn:
    id: "key-ಉ"
- tapOn:
    id: "key-ಗ"
# 'ಆ' is on the Shift layer
- tapOn:
    id: "key-Shift"
- tapOn:
    id: "key-ಆ"
- tapOn:
    id: "key-Shift"
- tapOn:
    id: "key-ಟ"
- takeScreenshot: "screenshots/padaku/08_typed_5_letters"

# 5. Submit guess
- tapOn:
    id: "key-Enter"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "screenshots/padaku/09_submitted_5_letters"

# 6. Fetch live solution from API and play it to win
- runFlow: play_solution/play_solution.yaml
