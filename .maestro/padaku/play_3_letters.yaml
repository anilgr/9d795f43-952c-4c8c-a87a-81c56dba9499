appId: app.puzzle.padaku
---
# 1. Take screenshot of Info Alert showing 3-letter word count
- takeScreenshot: "screenshots/padaku/03_info_alert_3_letters"

# 2. Dismiss Info Alert by tapping Continue
- tapOn: "ಮುಂದುವರಿಸು"

# 3. Execute walkthrough tutorial
- runFlow: walkthrough.yaml

# 4. Type a 3-letter guess (example: ಕಲಸ -> ಕ, ಲ, ಸ)
- tapOn:
    id: "key-ಕ"
- tapOn:
    id: "key-ಲ"
- tapOn:
    id: "key-ಸ"
- takeScreenshot: "screenshots/padaku/08_typed_3_letters"

# 5. Submit guess
- tapOn:
    id: "key-Enter"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "screenshots/padaku/09_submitted_3_letters"

# 6. Fetch live solution from API and play it to win
- runFlow: play_solution/play_solution.yaml
