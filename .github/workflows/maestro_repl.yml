name: Maestro Headless Remote REPL (iOS Simulator)

on:
  workflow_dispatch:

jobs:
  maestro-repl:
    # Use macOS 14 to get a stable, accelerated runtime context with modern Xcode tools
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -FsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install Bore via Homebrew
        run: |
          brew install bore-cli

      - name: Boot iOS Simulator
        run: |
          echo "====> Listing available iOS Simulators..."
          xcrun simctl list devices available
          
          # Boot a standard pre-installed runtime target (iPhone 15 is standard on macOS 14 runner images)
          echo "====> Booting iPhone 15 Simulator..."
          DEVICE_UUID=$(xcrun simctl list devices | grep -E "iPhone 15 \(" | grep -v "unavailable" | grep -oE "[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}" | head -n 1)
          
          if [ -z "$DEVICE_UUID" ]; then
            echo "iPhone 15 not found, falling back to creating a new runtime device target..."
            DEVICE_UUID=$(xcrun simctl create "Maestro-iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-2")
          fi
          
          echo "Booting Device UUID: $DEVICE_UUID"
          xcrun simctl boot "$DEVICE_UUID"
          
          # Wait for the simulator shell environment to cross the ready threshold
          xcrun simctl bootstatus "$DEVICE_UUID"

      - name: Start Services & Expose Remote REPL
        run: |
          echo "====> Starting Maestro Studio..."
          nohup maestro studio > maestro.log 2>&1 &
          sleep 10
          
          echo "====> Initializing Bore Tunnel..."
          nohup bore local 9999 --to bore.pub > bore.log 2>&1 &
          sleep 5
          
          echo "=========================================================="
          echo "🔗 REPL CONNECTION DETAILS:"
          cat bore.log | grep -E "Forwarding|Connected" || cat bore.log
          echo "=========================================================="
          
          echo "⏳ Session is live. Keeping macOS runner open for 1 hour..."
          for i in {1..60}; do
            echo "Keep-alive heartbeat: ($i/60 minutes elapsed)"
            sleep 60
          done
