name: Maestro Headless Remote REPL (macOS)

on:
  workflow_dispatch:

jobs:
  maestro-repl:
    # Upgraded to macos-14 to leverage Apple Silicon (M1) for natively fast ARM emulation
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          # FIXED: Pointing to the correct installation script endpoint
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install Bore via Homebrew (macOS native)
        run: |
          brew install bore-cli

      - name: Run Android Emulator (Apple Silicon Accelerated)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: arm64-v8a # FIXED: Matches the host M1 architecture for native speeds
          force-avd-creation: false
          # FIXED: Removed '-gpu swiftshader_indirect' to allow native hardware acceleration
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "====> Emulator is booted and ready on macOS!"
            
            # 1. Start Maestro Studio detached in the background
            echo "====> Starting Maestro Studio..."
            nohup maestro studio > maestro.log 2>&1 &
            sleep 10
            
            # 2. Expose local port 9999 over bore.pub
            echo "====> Initializing Bore Tunnel..."
            nohup bore local 9999 --to bore.pub > bore.log 2>&1 &
            sleep 5
            
            # 3. Print the live tunnel routing mapping to the console logs
            echo "=========================================================="
            echo "🔗 REPL CONNECTION DETAILS:"
            cat bore.log | grep -E "Forwarding|Connected" || cat bore.log
            echo "=========================================================="
            
            # 4. Stay-alive heartbeat loop to prevent runner idle timeouts
            echo "⏳ Session is live. Keeping runner open for 1 hour..."
            for i in {1..60}; do
              echo "Keep-alive heartbeat: ($i/60 minutes elapsed)"
              sleep 60
            done