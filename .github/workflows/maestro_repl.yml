name: Maestro Headless Remote REPL

on:
  workflow_dispatch: # Allows you to manually trigger this workflow from the GitHub Actions tab

jobs:
  maestro-repl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -FsSL "https://mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install Bore (Tunneling Tool)
        run: |
          # Use lowercase -o to explicitly define the output filename
          curl -L -o bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz https://github.com
          tar -xf bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz

      - name: Run Android Emulator (Headless)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "====> Emulator booted successfully!"
            
            # 1. Force Maestro Studio to run detached, sending stdout and stderr to logs
            echo "====> Starting Maestro Studio..."
            nohup maestro studio > maestro.log 2>&1 &
            
            # Give Maestro explicit time to complete startup sequences
            sleep 10
            
            # 2. Start Bore tunnel detached, ensuring it does not catch close signals
            echo "====> Initializing Bore Tunnel..."
            nohup bore local 9999 --to bore.pub > bore.log 2>&1 &
            
            # Give Bore a brief moment to finish handshaking with bore.pub
            sleep 5 
            
            # 3. Print the live tunnel routing lines
            echo "=========================================================="
            echo "🔗 REPL CONNECTION DETAILS:"
            cat bore.log | grep -E "Forwarding|Connected" || cat bore.log
            echo "=========================================================="
            
            # 4. Long sleep loop to safely keep the runner process actively listening
            echo "⏳ Interactive REPL session live. Keeping runner open..."
            for i in {1..60}; do
              echo "Session heartbeat check... ($i/60 minutes elapsed)"
              sleep 60
            done

