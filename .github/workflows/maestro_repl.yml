name: Maestro Headless Remote REPL (iOS Simulator)

on:
  workflow_dispatch:

jobs:
  maestro-repl:
    runs-on: macos-14
    timeout-minutes: 90

    env:
      MAESTRO_CLI_NO_ANALYTICS: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Maestro CLI + Fix PATH
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Boot iOS Simulator
        run: |
          echo "====> Listing simulators..."
          xcrun simctl list devices available
          
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 15 \(" | grep -v "unavailable" | grep -oE "[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}" | head -n 1)
          
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "Maestro-REPL" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-5" 2>/dev/null || \
                   xcrun simctl create "Maestro-REPL" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-2")
          fi
          
          echo "Booting $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "MAESTRO_DEVICE_UDID=$UDID" >> $GITHUB_ENV

      - name: Start Maestro Studio + Pinggy Tunnel
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          
          echo "====> Starting Maestro Studio..."
          nohup maestro studio > maestro.log 2>&1 &
          
          echo "Waiting 40 seconds for Studio to start..."
          sleep 40
          
          echo "====> Maestro Studio Logs:"
          cat maestro.log
          
          if ! lsof -i :9999 > /dev/null; then
            echo "Port still not ready. Waiting more..."
            sleep 20
          fi
          
          if lsof -i :9999 > /dev/null; then
            echo "✅ Success! Maestro Studio is running."
          else
            echo "❌ Failed to start."
            cat maestro.log
            exit 1
          fi
          
          echo "====> Starting Pinggy Tunnel..."
          nohup ssh -p 443 -R0:localhost:9999 -o StrictHostKeyChecking=no -o ServerAliveInterval=60 a.pinggy.io > tunnel.log 2>&1 &
          sleep 10
          
          echo "=========================================================="
          echo "🔗 REPL URL:"
          grep -o 'https://[a-zA-Z0-9.-]*\.pinggy\.link' tunnel.log | head -n 1
          echo "=========================================================="
          
          echo "Keeping session alive..."
          for i in {1..60}; do
            echo "Keep-alive: ($i/60)"
            sleep 60
          done