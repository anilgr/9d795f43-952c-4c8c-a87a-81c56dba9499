name: Maestro Headless Remote REPL (iOS Simulator)

on:
  workflow_dispatch:

jobs:
  maestro-repl:
    runs-on: macos-14
    timeout-minutes: 75

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS Simulator
        run: |
          echo "====> Listing available iOS Simulators..."
          xcrun simctl list devices available
          
          echo "====> Looking for iPhone 15..."
          DEVICE_UUID=$(xcrun simctl list devices available | grep -E "iPhone 15 \(" | grep -v "unavailable" | grep -oE "[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}" | head -n 1)
          
          if [ -z "$DEVICE_UUID" ]; then
            echo "iPhone 15 not found, creating new device..."
            # Try most reliable runtime first
            DEVICE_UUID=$(xcrun simctl create "Maestro-iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-5" 2>/dev/null || \
                         xcrun simctl create "Maestro-iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-2")
          fi
          
          echo "Booting Device UUID: $DEVICE_UUID"
          xcrun simctl boot "$DEVICE_UUID"
          xcrun simctl bootstatus "$DEVICE_UUID" -b   # Blocking wait until booted

      - name: Start Maestro Studio + Pinggy Tunnel
        run: |
          echo "====> Starting Maestro Studio (REPL)..."
          nohup $HOME/.maestro/bin/maestro studio --host 0.0.0.0 > maestro.log 2>&1 &
          
          # Wait for startup
          sleep 15
          
          echo "====> Maestro Studio Logs:"
          cat maestro.log
          
          # Verify it's listening
          if ! lsof -i :9999 > /dev/null; then
            echo "❌ Maestro Studio failed to bind to port 9999. Check logs above."
            exit 1
          fi
          echo "✅ Maestro Studio is running on 0.0.0.0:9999"
          
          echo "====> Starting Pinggy Tunnel..."
          nohup ssh -p 443 -R0:localhost:9999 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            a.pinggy.io > tunnel.log 2>&1 &
          
          sleep 8
          
          echo "=========================================================="
          echo "🔗 REPL CONNECTION DETAILS:"
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.pinggy\.link' tunnel.log | head -n 1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "$TUNNEL_URL"
            echo "Open this URL in your browser to access Maestro Studio REPL"
          else
            echo "⚠️  Tunnel URL not found. Check tunnel.log below:"
            cat tunnel.log
          fi
          echo "=========================================================="
          
          echo "⏳ Session is live. Keeping runner alive for ~60 minutes..."
          for i in {1..60}; do
            echo "Keep-alive heartbeat: ($i/60 minutes elapsed)"
            sleep 60
          done