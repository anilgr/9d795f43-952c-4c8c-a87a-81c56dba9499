name: Connect to macOS via CRD

on:
  workflow_dispatch:
    inputs:
      crd_command:
        description: 'Paste the exact macOS Auth command from Google Headless'
        required: true
      pin:
        description: '6-digit PIN to secure the connection'
        required: true
        default: '123456'

jobs:
  crd-connect:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Disable macOS Gatekeeper (Best Effort)
        run: |
          # Loosens macOS restrictions to allow the headless agent to hook the display
          sudo spctl --master-disable || true

      - name: Install Google Chrome & CRD Host
        run: |
          echo "Installing Google Chrome..."
          brew install --cask google-chrome
          
          echo "Downloading Chrome Remote Desktop..."
          curl -L "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg" -o crd.dmg
          hdiutil attach crd.dmg
          
          echo "Installing CRD Package..."
          # Using a wildcard (*) to account for the dynamic version number in the volume name
          sudo installer -pkg /Volumes/Chrome\ Remote\ Desktop*/Chrome\ Remote\ Desktop\ Host.pkg -target /
          
          echo "Cleaning up..."
          hdiutil detach /Volumes/Chrome\ Remote\ Desktop*

      - name: Authenticate & Start CRD
        env:
          CRD_CMD: ${{ github.event.inputs.crd_command }}
          PIN: ${{ github.event.inputs.pin }}
        run: |
          echo "Authenticating Host with Google..."
          
          # 1. Extract ONLY the auth code (starts with 4/)
          AUTH_CODE=$(echo "$CRD_CMD" | grep -o '4/[a-zA-Z0-9_-]*' | head -n 1)
          
          if [ -z "$AUTH_CODE" ]; then
            echo "Error: Could not find the auth code in your input."
            exit 1
          fi
          
          echo "Successfully extracted Auth Code: $AUTH_CODE"
          
          # 2. Dynamically search for the Mac host executable
          echo "Locating the CRD executable..."
          START_HOST=$(find /Library/PrivilegedHelperTools /Applications /opt -name "*start_host*" -type f -perm +111 2>/dev/null | head -n 1)
          
          if [ -z "$START_HOST" ]; then
            echo "Error: Could not find the Chrome Remote Desktop executable."
            exit 1
          fi
          
          echo "Found CRD host executable at: $START_HOST"
          
          # 3. Run the executable with your extracted code
          "$START_HOST" \
            --code="$AUTH_CODE" \
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
            --name="GitHub-macOS-Runner" \
            --pin="$PIN"

      - name: Keep Runner Alive
        run: |
          echo "====================================================="
          echo "🚀 CRD is running! "
          echo "Go to https://remotedesktop.google.com/access to connect."
          echo "This job will stay alive for 55 minutes."
          echo "====================================================="
          
          # Keep the action running so the machine doesn't shut down
          for i in {1..11}; do
            sleep 300
            echo "--- Still alive (${i}x5 min) ---"
          done