name: Debug macOS Runner via Web Browser

on:
  workflow_dispatch:
    inputs:
      build_padaku:
        description: 'Clone Padaku repo & start background iOS build'
        required: true
        default: true
        type: boolean
      padaku_branch:
        description: ' ↳ Branch to build (only used if build_padaku above is checked)'
        required: false
        default: 'master'
        type: string
      install_maestro:
        description: 'Install Maestro CLI & cap screenshot helper'
        required: true
        default: true
        type: boolean

jobs:
  debug-mac-session:
    runs-on: macos-latest # Tells GitHub to use an Apple Silicon (M1/M2/M3) macOS machine

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Homebrew Downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            brew-cache-${{ runner.os }}-

      - name: Install ttyd and lrzsz (Zmodem) via Homebrew
        run: |
          # Homebrew is pre-installed on GitHub macOS runners
          brew update
          brew install ttyd lrzsz

      - name: Install Ngrok Tunnel on Mac
        run: |
          brew install ngrok

      - name: Install Maestro, Antigravity CLI and Setup Helpers
        if: ${{ inputs.install_maestro }}
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          
          # Setup global 'cap' command to take simulator screenshot and download via Zmodem
          sudo tee /usr/local/bin/cap > /dev/null << 'EOF'
          #!/usr/bin/env bash
          file="${1:-/tmp/sim_cap.png}"
          xcrun simctl io booted screenshot "$file" && sz "$file"
          EOF
          sudo chmod +x /usr/local/bin/cap
          
          cat << 'EOF' >> $HOME/.bashrc
          alias simcap='cap'
          alias sc='cap'
          EOF
          cat << 'EOF' >> $HOME/.bash_profile
          if [ -f ~/.bashrc ]; then . ~/.bashrc; fi
          EOF

      - name: Clone Private Padaku Repository
        if: ${{ inputs.build_padaku }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PADAKU_BRANCH: ${{ inputs.padaku_branch || 'master' }}
        run: |
          echo "Cloning Padaku branch: ${PADAKU_BRANCH}..."
          git clone -b "${PADAKU_BRANCH}" https://${GH_PAT}@github.com/anilgr/Padaku.git

      - name: Cache Yarn, node_modules, CocoaPods, and Pods
        if: ${{ inputs.build_padaku }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            Padaku/node_modules
            ~/Library/Caches/CocoaPods
            Padaku/ios/Pods
          key: padaku-deps-${{ runner.os }}-${{ hashFiles('Padaku/yarn.lock', 'Padaku/ios/Podfile.lock') }}
          restore-keys: |
            padaku-deps-${{ runner.os }}-

      - name: Start Background Build (Yarn & iOS)
        if: ${{ inputs.build_padaku }}
        env:
          PADAKU_BRANCH: ${{ inputs.padaku_branch || 'master' }}
        run: |
          # Run yarn install + yarn ios in background so ttyd starts immediately
          # Monitor progress inside the session: tail -f /tmp/build.log
          nohup bash -c "cd Padaku && yarn install && yarn ios" > /tmp/build.log 2>&1 &
          echo "🔨 Background build started on branch '${PADAKU_BRANCH}'. Monitor with: tail -f /tmp/build.log"

      - name: Start ttyd and Expose Tunnel
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          TTYD_USER: ${{ secrets.TTYD_USER || 'admin' }}
          TTYD_PASS: ${{ secrets.TTYD_PASSWORD || 'runnerpass' }}
        run: |
          if command -v ngrok &> /dev/null && [ -n "$NGROK_AUTHTOKEN" ]; then
            ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          fi
          
          if command -v ttyd &> /dev/null; then
            nohup ttyd -W -t enableZmodem=true -p 8080 -c "$TTYD_USER:$TTYD_PASS" bash > ttyd.log 2>&1 &
          fi
          
          if command -v ngrok &> /dev/null; then
            nohup ngrok http 8080 > ngrok.log 2>&1 &
            sleep 5
            PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
            echo "=========================================================="
            echo "🚀 ACCESS YOUR MAC RUNNER TERMINAL HERE:"
            echo "$PUBLIC_URL"
            echo "🔐 Credentials -> User: $TTYD_USER | Pass: $TTYD_PASS"
            echo "📸 To take an iOS screenshot and download via Zmodem: cap (or simcap / sc)"
            echo "📥 To download files to your browser via Zmodem: sz <filename>"
            echo "📤 To upload files from your browser via Zmodem: rz"
            echo "=========================================================="
          fi

      - name: Keep Mac Runner Open (Interactive Loop)
        run: |
          echo "🔄 The Mac runner is locked open for debugging."
          echo "👉 To close the session and stop billing, type: touch /tmp/stop_debug"
          
          # Infinite loop scanning for our kill-switch file
          while [ ! -f /tmp/stop_debug ]; do
            sleep 5
          done
          
          echo "🛑 Kill switch file detected. Cleaning up Mac runner."
