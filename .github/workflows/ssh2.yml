name: Debug macOS Runner via Web Browser

on:
  workflow_dispatch: # Allows manual execution from the GitHub Actions dashboard

jobs:
  debug-mac-session:
    runs-on: macos-latest # Tells GitHub to use an Apple Silicon (M1/M2/M3) macOS machine

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ttyd and lrzsz (Zmodem) via Homebrew
        run: |
          # Homebrew is pre-installed on GitHub macOS runners
          brew update
          brew install ttyd lrzsz

      - name: Install Ngrok Tunnel on Mac
        run: |
          brew install ngrok

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Clone Private Repository and Start Background Build
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://${GH_PAT}@github.com/anilgr/Padaku.git
          # Run yarn install + yarn ios in background so ttyd starts immediately
          # Monitor progress inside the session: tail -f /tmp/build.log
          nohup bash -c "cd Padaku && yarn install && yarn ios" > /tmp/build.log 2>&1 &
          echo "🔨 Background build started. Monitor with: tail -f /tmp/build.log"

      - name: Start ttyd and Expose Tunnel
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          TTYD_USER: ${{ secrets.TTYD_USER || 'admin' }}
          TTYD_PASS: ${{ secrets.TTYD_PASSWORD || 'runnerpass' }}
        run: |
          # 1. Authenticate Ngrok
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          
          # 2. Start ttyd with Zmodem (lrzsz) enabled
          # Sets credentials from GitHub secrets (or fallbacks to admin:runnerpass)
          nohup ttyd -W -t enableZmodem=true -p 8080 -c "$TTYD_USER:$TTYD_PASS" bash > ttyd.log 2>&1 &
          
          # 3. Start Ngrok tunnel over port 8080
          nohup ngrok http 8080 > ngrok.log 2>&1 &
          
          # Give processes 5 seconds to bind to ports cleanly
          sleep 5
          
          # 4. Fetch the public Ngrok endpoint to display in pipeline logs
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "=========================================================="
          echo "🚀 ACCESS YOUR MAC RUNNER TERMINAL HERE:"
          echo "$PUBLIC_URL"
          echo "🔐 Credentials -> User: $TTYD_USER | Pass: $TTYD_PASS"
          echo "📥 To download files to your browser via Zmodem: sz <filename>"
          echo "📤 To upload files from your browser via Zmodem: rz"
          echo "=========================================================="

      - name: Keep Mac Runner Open (Interactive Loop)
        run: |
          echo "🔄 The Mac runner is locked open for debugging."
          echo "👉 To close the session and stop billing, type: touch /tmp/stop_debug"
          
          # Infinite loop scanning for our kill-switch file
          while [ ! -f /tmp/stop_debug ]; do
            sleep 5
          done
          
          echo "🛑 Kill switch file detected. Cleaning up Mac runner."
