name: "iOS: E2E Tests & Screenshots (Maestro)"

on:
  push:
    branches: [ master, main, 'debug/*' ]
  workflow_dispatch:
    inputs:
      flow_path:
        description: "Path to Maestro test or flow file"
        required: true
        default: ".maestro/padaku/padaku_test.yaml"
  pull_request:
    branches: [ master, main ]

jobs:
  test_ios_simulator:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      # Skip JS bundling on CI because main.jsbundle is pre-bundled on Windows and checked in
      SKIP_BUNDLING: true
      # Increase Maestro iOS XCTest driver startup timeout to 5 minutes (300,000 ms) for cold CI runners
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
      MAESTRO_CLI_NO_ANALYTICS: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: ./.github/actions/xcode-latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Boot iOS Simulator
        run: |
          xcrun simctl shutdown all || true
          UDID=$(xcrun simctl list devices available | grep -v 'Watch\|TV\|iPad' | grep -E 'iPhone 16|iPhone 15' | tail -n 1 | sed -E 's/.*(([0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12})).*/\1/')
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep -v 'Watch\|TV\|iPad' | grep 'iPhone' | tail -n 1 | sed -E 's/.*(([0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12})).*/\1/')
          fi
          echo "Selected iPhone Simulator UDID: $UDID"
          xcrun simctl boot $UDID || true
          xcrun simctl bootstatus $UDID -b
          echo "MAESTRO_DEVICE_UDID=$UDID" >> $GITHUB_ENV

      - name: Cache CocoaPods and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ios/build
          key: ${{ runner.os }}-pods-and-build-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-and-build-

      - name: Build iOS App for Simulator
        if: env.SKIP_BUNDLING != 'true'
        run: |
          cd ios
          pod install --repo-update
          xcodebuild -workspace Padaku.xcworkspace \
            -scheme Padaku \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Build iOS App without JS Bundling (Pre-bundled)
        if: env.SKIP_BUNDLING == 'true'
        run: |
          cd ios
          pod install --repo-update
          xcodebuild -workspace Padaku.xcworkspace \
            -scheme Padaku \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            SKIP_BUNDLING=true \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name "*.app" | head -n 1)
          echo "Injecting pre-built offline bundle and assets into $APP_PATH..."
          cp "$GITHUB_WORKSPACE/ios/main.jsbundle" "$APP_PATH/main.jsbundle"
          cp -R "$GITHUB_WORKSPACE/ios/assets" "$APP_PATH/" || true
          ls -lh "$APP_PATH/main.jsbundle"

      - name: Install & Warm Up App on Simulator
        run: |
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" | head -n 1)
          if [ "$SKIP_BUNDLING" = "true" ]; then
            echo "Verifying pre-built bundle inside $APP_PATH..."
            cp "$GITHUB_WORKSPACE/ios/main.jsbundle" "$APP_PATH/main.jsbundle"
            cp -R "$GITHUB_WORKSPACE/ios/assets" "$APP_PATH/" || true
            ls -lh "$APP_PATH/main.jsbundle"
          fi
          echo "Installing $APP_PATH to simulator $MAESTRO_DEVICE_UDID"
          xcrun simctl install $MAESTRO_DEVICE_UDID "$APP_PATH"
          echo "Waiting for LaunchServices to register app bundle..."
          sleep 5
          echo "Warming up simulator and SpringBoard..."
          xcrun simctl launch $MAESTRO_DEVICE_UDID app.puzzle.padaku || true
          sleep 5

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start iOS App Console Capture
        run: |
          mkdir -p maestro_test_logs
          echo "Starting simctl log stream for Padaku process..."
          xcrun simctl spawn booted log stream --level debug --style syslog --predicate 'processImagePath contains "Padaku" OR subsystem == "com.facebook.react.JavaScript" OR eventMessage contains "[PADAKU_DEBUG]" OR composedMessage contains "[PADAKU_DEBUG]"' > maestro_test_logs/padaku_app_console.log 2>&1 &

      - name: Run Maestro Tests
        run: |
          mkdir -p screenshots
          FLOW_TARGET="${{ github.event.inputs.flow_path || '.maestro/padaku/padaku_test.yaml' }}"
          echo "Starting iOS Simulator console log capture..."
          xcrun simctl spawn $MAESTRO_DEVICE_UDID log stream --level debug > screenshots/simulator_console.log 2>&1 &
          LOG_PID=$!
          echo "Executing Maestro flow: $FLOW_TARGET"
          maestro test "$FLOW_TARGET" --device $MAESTRO_DEVICE_UDID || true
          kill $LOG_PID || true

      - name: Upload Screenshot & Log Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-screenshots-and-logs
          path: |
            screenshots/
            ~/.maestro/tests/
          retention-days: 7

      - name: Commit & Push Test Artifacts to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p maestro_test_logs
          cp -R ~/.maestro/tests/* maestro_test_logs/ || true
          rm -f screenshots/simulator_console.log maestro_test_logs/**/simulator_console.log || true
          find screenshots maestro_test_logs -type f -size +50M -delete || true
          git add -f screenshots/ maestro_test_logs/ || true
          if ! git diff --cached --quiet; then
            git commit -m "test(artifacts): update iOS simulator screenshots and logs [skip ci]"
            git push origin HEAD:${{ github.ref }} || true
          fi
