name: SHOULD BE REVERTED Maestro Headless Remote REPL (iOS Simulator)

on:
  workflow_dispatch:

jobs:
  maestro-repl:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      MAESTRO_CLI_NO_ANALYTICS: true
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Boot iOS Simulator
        run: |
          echo "====> Listing Simulators..."
          xcrun simctl list devices available
          
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 15 \(" | grep -v "unavailable" | grep -oE "[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}" | head -n 1)
          
          if [ -z "$UDID" ]; then
            echo "Creating new iPhone 15..."
            UDID=$(xcrun simctl create "Maestro-REPL" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-5" 2>/dev/null || \
                   xcrun simctl create "Maestro-REPL" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-2")
          fi
          
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "MAESTRO_DEVICE_UDID=$UDID" >> $GITHUB_ENV

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      - name: Start Maestro Studio + Pinggy Tunnel
        run: |
          echo "====> Starting Maestro Studio REPL..."
          
          # Run in background
          nohup $HOME/.maestro/bin/maestro studio \
            --device "$MAESTRO_DEVICE_UDID" > maestro.log 2>&1 &
          
          echo "Waiting for Studio to start (30-45 seconds)..."
          sleep 35
          
          echo "====> Maestro Studio Logs:"
          cat maestro.log
          
          # Check port
          if ! lsof -i :9999 > /dev/null; then
            echo "❌ Failed to start on port 9999. Trying again with longer wait..."
            pkill -f "maestro studio" || true
            sleep 5
            nohup $HOME/.maestro/bin/maestro studio --device "$MAESTRO_DEVICE_UDID" > maestro.log 2>&1 &
            sleep 45
          fi
          
          if lsof -i :9999 > /dev/null; then
            echo "✅ Maestro Studio is running on port 9999!"
          else
            echo "❌ Still failed. Full log:"
            cat maestro.log
            exit 1
          fi
          
          echo "====> Starting Pinggy Tunnel..."
          nohup ssh -p 443 -R0:localhost:9999 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            a.pinggy.io > tunnel.log 2>&1 &
          
          sleep 10
          
          echo "=========================================================="
          echo "🔗 REPL CONNECTION DETAILS:"
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.pinggy\.link' tunnel.log | head -n 1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "$TUNNEL_URL"
            echo "Open the link above in your browser to use Maestro Studio REPL"
          else
            echo "Tunnel log:"
            cat tunnel.log
          fi
          echo "=========================================================="
          
          echo "⏳ Keeping session alive for 60 minutes..."
          for i in {1..60}; do
            echo "Keep-alive: ($i/60)"
            sleep 60
          done