name: "Xcode latest"
description: Select available version of Xcode.

runs:
  using: "composite"
  steps:
    - name: Select latest Xcode
      run: |
        echo "🔍 Checking available Xcodes..."
        ls /Applications | grep Xcode || true
        # If Xcode 15.4 is installed (macos-14 runner), use it for maximum build speed & clean React Native C++ compatibility
        if [ -d "/Applications/Xcode_15.4.app" ]; then
          xcode="Xcode_15.4.app"
        else
          xcode=$(ls /Applications | grep Xcode | sort -Vr | head -n 1)
        fi
        echo "Selected Xcode: $xcode"
        sudo xcode-select -s "/Applications/$xcode/Contents/Developer"
      shell: bash

    - name: Show selected Xcode version
      run: xcodebuild -version
      shell: bash
